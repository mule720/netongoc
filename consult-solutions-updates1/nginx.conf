server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy GraphQL and REST API to the Django backend
    location /graphql/ {
        proxy_pass https://netongoc-backend-23h6yo3beq-bq.a.run.app/graphql/;
        proxy_set_header Host netongoc-backend-23h6yo3beq-bq.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location /api/ {
        proxy_pass https://netongoc-backend-23h6yo3beq-bq.a.run.app/api/;
        proxy_set_header Host netongoc-backend-23h6yo3beq-bq.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        client_max_body_size 10m;
        # Forward all methods including DELETE
        proxy_method $request_method;
    }

    location /api/uploads/ {
        proxy_pass https://netongoc-backend-23h6yo3beq-bq.a.run.app/api/uploads/;
        proxy_set_header Host netongoc-backend-23h6yo3beq-bq.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        client_max_body_size 20m;
    }

    # React router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
